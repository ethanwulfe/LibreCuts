name: LibreCuts Deep Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with FULL Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c 

      - name: Build with Native Linking
        # 'clean' removes broken cache; 'assembleDebug' ensures it installs
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace -Dorg.gradle.cuda=false
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Deep-Build
          path: "app/build/outputs/apk/debug/*.apk"
