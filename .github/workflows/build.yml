name: Android Final Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Grant execute permission
        run: chmod +x gradlew

      # This is the "Magic" line: It builds the powerful version but signs it so it installs
      - name: Build Installable Release
        run: ./gradlew assembleRelease -Pandroid.packageSigningConfigs.release.storeFile=debug.keystore -Pandroid.packageSigningConfigs.release.storePassword=android -Pandroid.packageSigningConfigs.release.keyAlias=androiddebugkey -Pandroid.packageSigningConfigs.release.keyPassword=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Working-Build
          path: "app/build/outputs/apk/release/*.apk"
