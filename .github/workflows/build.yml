name: LibreCuts Full Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull FULL Source (Icons + Engine)
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- FIXES MISSING ICONS
          lfs: true              # <--- FIXES VIDEO ASSETS
          fetch-depth: 0

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Setup Video Engine (NDK)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c     # <--- FIXES EXPORT CRASHES

      - name: 4. Grant Permissions
        run: chmod +x gradlew

      - name: 5. Build Easy-Install APK
        # We use assembleDebug so your phone doesn't reject the signature
        run: ./gradlew assembleDebug --stacktrace

      - name: 6. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Working-App
          path: "app/build/outputs/apk/debug/*.apk"
