name: Android Build
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # This forces the build to use the debug key so it's installable
      - name: Build Signed Release APK
        run: ./gradlew assembleRelease -Pandroid.packageSigningConfigs.release.storeFile=debug.keystore -Pandroid.packageSigningConfigs.release.storePassword=android -Pandroid.packageSigningConfigs.release.keyAlias=androiddebugkey -Pandroid.packageSigningConfigs.release.keyPassword=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Installable
          path: "app/build/outputs/apk/release/*.apk"
