name: LibreCuts-Final-Optimized
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Deep Checkout (Icons + Engine)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Setup NDK (r25c)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: 4. Build Optimized for arm64-v8a
        # We add the '-Pandroid.bundle.enableUncompressedNativeLibs=false' 
        # and ABI filter to make the video engine more stable.
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            -Pandroid.injected.abi.override=arm64-v8a \
            --stacktrace --no-daemon

      - name: 5. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Optimized-Build
          path: "app/build/outputs/apk/debug/*.apk"
