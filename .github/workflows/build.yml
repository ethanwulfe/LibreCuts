name: LibreCuts-Full-Resource-Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Deep Checkout (Forces Submodule/Icon Sync)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Setup NDK (Crucial for Video Engine)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: 4. Build with Clean and Resource Refresh
        # We add 'clean' to force the icons to be re-indexed.
        # We use '--stacktrace' to see why the engine might be failing.
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            -Pandroid.injected.abi.override=arm64-v8a \
            --stacktrace --no-daemon

      - name: 5. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Full-Build
          path: "app/build/outputs/apk/debug/*.apk"
