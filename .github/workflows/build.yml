name: LibreCuts-Final-Full-Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Deep Checkout (Fixes Icons)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Setup NDK (r25c)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: 4. Build with Engine Support
        run: |
          chmod +x gradlew
          # We add a flag to ensure the video engine is packaged for 64-bit
          ./gradlew clean assembleDebug \
            -Pandroid.injected.abi.override=arm64-v8a \
            --stacktrace

      - name: 5. Upload Working App
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Working-Export
          path: "app/build/outputs/apk/debug/*.apk"
