name: LibreCuts-Engine-and-UI-Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Deep Checkout (Submodules + LFS)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Setup Android NDK (Required for Video Engine)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c # Matches the required FFmpeg-Kit baseline

      - name: 4. Build Optimized Debug APK
        # 'clean' prevents old 'hollow' files from being reused
        # 'assembleDebug' ensures easy installation without signature errors
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: 5. Upload Working App
        uses: actions/upload-artifact@v4
        with:
          name: LibreCuts-Final-Fixed
          path: "app/build/outputs/apk/debug/*.apk"
